# Sporty Summer DXB — runnable Odoo 19 stack.
#
# Usage (from the repo root):
#   docker compose -f deploy/docker-compose.yml up -d
# then open http://localhost:8069
#
# The three custom modules are mounted read-only from the repo, so editing the
# code on your Mac is reflected after an Odoo restart / module upgrade.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:19
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ../estate:/mnt/extra-addons/estate:ro
      - ../estate_accounts:/mnt/extra-addons/estate_accounts:ro
      - ../sporty_summer:/mnt/extra-addons/sporty_summer:ro
      - ../dubai_tourism:/mnt/extra-addons/dubai_tourism:ro
    restart: unless-stopped

volumes:
  odoo-db:
  odoo-data:
